title: La Fête Studio
description: Wedding invitations & paper goods — with a private client proofing portal
url: "https://www.lafetestudio.com" # your custom domain
baseurl: ""

studio_email: "brigitte@lafetestudio.com"

# One shared inquiry form for the homepage (separate from each client's
# per-proof feedback form, which lives in that client's own file).
inquiry_form_id: "YOUR_INQUIRY_FORM_ID"

# Every file in _clients/ becomes its own static page at /clients/<slug>/
# Every file in _portfolio/ is a work sample — used on the homepage teaser
# and the full /portfolio/ page, but doesn't get its own URL (output: false).
collections:
  clients:
    output: true
    permalink: /clients/:path/
  portfolio:
    output: false

defaults:
  - scope:
      path: ""
      type: clients
    values:
      layout: client-portal
  - scope:
      path: "index.md"
    values:
      layout: home
  - scope:
      path: "login.md"
    values:
      layout: login
  - scope:
      path: "portfolio.md"
    values:
      layout: portfolio

plugins: []

exclude:
  - scripts/
  - README.md
  - Gemfile
  - Gemfile.lock
